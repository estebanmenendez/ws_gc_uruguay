site:
  name: Widows Sons — Gran Chapter de Uruguay
  site: 'https://www.wsuruguay.com' # <--- CORREGIDO: Dominio oficial del Gran Capítulo
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: orcPxI47GSa-cRvY11tUe6iGg2IO_RPvnA1q95iEM3M

# Metadatos SEO (Elevados al enfoque institucional nacional)
metadata:
  title:
    default: Gran Chapter Widows Sons Uruguay
    template: '%s — Widows Sons Uruguay'
  description: 'Sitio oficial del Gran Chapter de Widows Sons Uruguay. Máxima autoridad, orden rector y regularidad de los Maestros Masones motociclistas.' # <--- CORREGIDO: Enfoque nacional
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Widows Sons — Gran Chapter Uruguay
    images:
      - url: '~/assets/images/default-gc.png' # <--- NUEVO: Archivo renombrado para destruir el caché de WhatsApp
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@widowssons'
    site: '@widowssons'
    cardType: summary_large_image

i18n:
  language: es
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

# Configuración de Interfaz: Forzado de Modo Oscuro
ui:
  theme: dark
  showThemeSwitcher: false
